producer:
    build: ./producer
    container_name: producer
    depends_on:
      - kafka
    environment:
      KAFKA_BROKER: kafka:29092
      OPENSKY_CLIENT_ID: rnkanalytics-api-client
      OPENSKY_CLIENT_SECRET: your_new_secret_here
```

Replace `your_new_secret_here` with your new regenerated secret — but **don't push this to GitHub**. Instead add `docker-compose.yml` to `.gitignore` and keep it local.

Actually — better approach. Create a `.env` file in your project root:
```
OPENSKY_CLIENT_ID=rnkanalytics-api-client
OPENSKY_CLIENT_SECRET=your_new_secret_here